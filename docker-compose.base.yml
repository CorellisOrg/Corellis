# 🦞 Lobster Farm - Docker Compose Base Template
#
# This is the starting point for a new lobster farm.
# DO NOT edit this file directly — use spawn-lobster.sh to add lobsters.
#
# The spawn script automatically:
#   1. Appends a new service definition to docker-compose.yml
#   2. Adds the volume declaration
#   3. Starts the container
#
# Usage:
#   cp docker-compose.base.yml docker-compose.yml
#   ./scripts/spawn-lobster.sh alice U0XXXXXXXXX xoxb-xxx xapp-xxx

volumes: {}

services:
  # Placeholder to keep compose file valid when empty.
  # Docker ignores services with "profiles: [never]".
  placeholder:
    image: hello-world
    profiles:
      - never
